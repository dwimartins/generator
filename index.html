<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Generator Undangan</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- SortableJS untuk Drag & Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    // Removed custom beige, utilizing Tailwind's standard blue palette
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for light mode */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
        .modal-exit { opacity: 1; transform: scale(1); }
        .modal-exit-active { opacity: 0; transform: scale(0.95); transition: all 0.2s ease-in; }

        /* Sortable drag styles */
        .sortable-ghost { opacity: 0.4; background-color: #e2e8f0; }
        .sortable-drag { cursor: grabbing !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased selection:bg-blue-500 selection:text-white pb-20">

    <!-- Navbar -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg shadow-md shadow-blue-500/20 flex items-center justify-center">
                        <i class="ph ph-layout text-xl text-white"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800">Katalog<span class="text-blue-600">Hub</span></span>
                </div>
                <div class="flex gap-2 sm:gap-3">
                    <button onclick="openCategoryModal()" class="flex items-center justify-center sm:px-4 sm:py-2 gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 w-10 h-10 sm:w-auto text-sm font-medium rounded-lg transition-colors border border-slate-200" title="Atur Kategori">
                        <i class="ph ph-list-numbers text-lg"></i>
                        <span class="hidden sm:inline">Atur Kategori</span>
                    </button>
                    <button onclick="openThemeModal()" class="flex items-center justify-center sm:px-4 sm:py-2 gap-2 bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 sm:w-auto text-sm font-medium rounded-lg transition-colors shadow-lg shadow-blue-500/30" title="Tambah Tema">
                        <i class="ph ph-plus-circle text-lg"></i>
                        <span class="hidden sm:inline">Tambah Tema</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Layout Container (Expanded max-width for Explorer look) -->
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 mt-6 flex flex-col lg:flex-row gap-6 items-start">
        
        <!-- Sidebar Wrapper: Contains Toggle Button & Sidebar Panel -->
        <div id="sidebar-wrapper" class="w-full lg:w-[420px] shrink-0 lg:sticky lg:top-20 transition-all duration-300 flex flex-col gap-3">
            
            <!-- Toggle Button (Explorer Style) -->
            <div class="flex justify-start">
                <button onclick="toggleSidebar()" id="sidebar-toggle-btn" class="flex items-center justify-center bg-white hover:bg-blue-50 text-slate-600 hover:text-blue-600 border border-slate-200 shadow-sm w-9 h-9 rounded-lg transition-colors" title="Sembunyikan/Tampilkan Panel">
                    <i class="ph ph-sidebar-simple text-xl"></i>
                </button>
            </div>

            <!-- Sidebar Panel: Link Penting -->
            <aside id="sidebar" class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 w-full transition-all duration-300 origin-left overflow-hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-bold text-slate-800 flex items-center gap-2 text-sm">
                        <i class="ph ph-link text-blue-600 text-lg"></i> Link Penting
                    </h2>
                    <button onclick="openLinkModal()" class="text-blue-600 hover:text-white hover:bg-blue-600 bg-blue-50 p-1.5 rounded-lg transition" title="Tambah Link Penting">
                        <i class="ph ph-plus font-bold text-sm"></i>
                    </button>
                </div>
                
                <div id="links-content" class="space-y-3">
                    <!-- Loading State Links -->
                    <div class="flex justify-center py-4">
                        <i class="ph ph-spinner-gap animate-spin text-2xl text-blue-500"></i>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Main Content: Tema -->
        <main class="w-full flex-1 transition-all duration-300 min-w-0" id="main-container">
            <!-- Loading State Tema -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-20">
                <i class="ph ph-spinner-gap animate-spin text-4xl text-blue-500 mb-4"></i>
                <p class="text-slate-500 font-medium">Memuat data tema...</p>
            </div>

            <!-- Content Area (Injected via JS) -->
            <div id="themes-content" class="hidden space-y-10"></div>
        </main>
        
    </div>

    <!-- Modal Form Tema -->
    <div id="theme-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeThemeModal()"></div>
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0 pointer-events-none">
            <div id="theme-modal-panel" class="relative bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-lg w-full border border-slate-200 pointer-events-auto modal-enter flex flex-col max-h-[90vh]">
                <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 shrink-0">
                    <h3 class="text-lg leading-6 font-bold text-slate-800" id="modal-title">Tambah Tema Baru</h3>
                    <button onclick="closeThemeModal()" class="text-slate-400 hover:text-slate-700 transition">
                        <i class="ph ph-x text-xl"></i>
                    </button>
                </div>
                <form id="theme-form" onsubmit="handleThemeSubmit(event)" class="flex flex-col overflow-hidden">
                    <div class="px-6 py-5 space-y-4 overflow-y-auto">
                        <input type="hidden" id="theme-id">
                        
                        <!-- Judul -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Judul Tema</label>
                            <input type="text" id="theme-title" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="Contoh: Tanpa Foto Black Gold">
                        </div>

                        <!-- Kategori (Select Dropdown) -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Kategori</label>
                            <select id="theme-category-select" onchange="toggleNewCategoryInput()" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition cursor-pointer appearance-none">
                                <!-- Options injected via JS -->
                            </select>
                            
                            <!-- Input untuk Kategori Baru (Hidden by default) -->
                            <input type="text" id="theme-category-new" class="hidden w-full mt-2 bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="Ketik nama kategori baru disini...">
                        </div>

                        <!-- Image URL -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">URL Gambar (ImageKit)</label>
                            <input type="url" id="theme-image" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="https://ik.imagekit.io/...">
                        </div>

                        <!-- Link Generator -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Link Generator</label>
                            <input type="url" id="theme-generator" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="https://...">
                        </div>

                        <!-- Link Preview -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Link Preview</label>
                            <input type="url" id="theme-preview" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="https://...">
                        </div>
                    </div>
                    <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 shrink-0">
                        <button type="button" onclick="closeThemeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 bg-white border border-slate-300 rounded-lg transition">Batal</button>
                        <button type="submit" id="btn-submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition shadow-lg shadow-blue-500/30 flex items-center gap-2">
                            <i class="ph ph-floppy-disk text-lg"></i>
                            <span>Simpan Data</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Form Link Penting -->
    <div id="link-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeLinkModal()"></div>
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0 pointer-events-none">
            <div id="link-modal-panel" class="relative bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-md w-full border border-slate-200 pointer-events-auto modal-enter flex flex-col">
                <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 shrink-0">
                    <h3 class="text-lg leading-6 font-bold text-slate-800" id="link-modal-title">Tambah Link Penting</h3>
                    <button onclick="closeLinkModal()" class="text-slate-400 hover:text-slate-700 transition">
                        <i class="ph ph-x text-xl"></i>
                    </button>
                </div>
                <form id="link-form" onsubmit="handleLinkSubmit(event)" class="flex flex-col">
                    <div class="px-6 py-5 space-y-4">
                        <input type="hidden" id="link-id">
                        
                        <!-- Judul Link -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Judul Link</label>
                            <input type="text" id="link-title" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="Contoh: Form Pemesanan, WA Admin...">
                        </div>

                        <!-- Deskripsi Singkat Link -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Deskripsi Singkat (Opsional)</label>
                            <input type="text" id="link-desc" class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="Tulis catatan atau detail info...">
                        </div>

                        <!-- URL Link -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">URL Link</label>
                            <input type="url" id="link-url" required class="w-full bg-white border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition" placeholder="https://...">
                        </div>
                    </div>
                    <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 shrink-0">
                        <button type="button" onclick="closeLinkModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 bg-white border border-slate-300 rounded-lg transition">Batal</button>
                        <button type="submit" id="btn-submit-link" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition shadow-lg shadow-blue-500/30 flex items-center gap-2">
                            <i class="ph ph-floppy-disk text-lg"></i>
                            <span>Simpan Link</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Atur Kategori -->
    <div id="category-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeCategoryModal()"></div>
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0 pointer-events-none">
            <div id="category-modal-panel" class="relative bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-md w-full border border-slate-200 pointer-events-auto modal-enter">
                <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h3 class="text-lg leading-6 font-bold text-slate-800">Atur Urutan Kategori</h3>
                    <button onclick="closeCategoryModal()" class="text-slate-400 hover:text-slate-700 transition">
                        <i class="ph ph-x text-xl"></i>
                    </button>
                </div>
                <div class="px-6 py-4">
                    <p class="text-sm text-slate-500 mb-4 bg-blue-50 text-blue-700 p-3 rounded-lg border border-blue-100">
                        <i class="ph ph-info inline mr-1"></i>
                        Tahan dan geser ikon <i class="ph ph-dots-six-vertical inline font-bold"></i> untuk mengatur urutan kategori di dashboard.
                    </p>
                    <ul id="sortable-categories" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                        <!-- List Kategori diisi via JS -->
                    </ul>
                </div>
                <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3">
                    <button type="button" onclick="closeCategoryModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 bg-white border border-slate-300 rounded-lg transition">Batal</button>
                    <button type="button" onclick="saveCategoryOrder()" id="btn-save-category" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition shadow-lg shadow-blue-500/30 flex items-center gap-2">
                        <i class="ph ph-check-circle text-lg"></i>
                        <span>Simpan Urutan</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-[100] flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl border pointer-events-none bg-white">
        <i id="toast-icon" class="text-xl"></i>
        <span id="toast-message" class="text-sm font-medium text-slate-800"></span>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="flex items-center justify-center min-h-screen px-4 text-center pointer-events-none">
            <div class="relative bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform sm:max-w-sm w-full border border-slate-200 pointer-events-auto">
                <div class="p-6">
                    <div class="flex items-center justify-center w-14 h-14 rounded-full bg-red-100 text-red-600 mb-4 mx-auto border border-red-200">
                        <i class="ph ph-warning-circle text-3xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-center text-slate-800 mb-2" id="confirm-title">Hapus Data?</h3>
                    <p class="text-sm text-center text-slate-500" id="confirm-desc">Data ini akan dihapus secara permanen dan tidak dapat dikembalikan.</p>
                </div>
                <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-center gap-3">
                    <button onclick="closeConfirmModal()" class="px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-200 transition w-full bg-slate-100 rounded-lg border border-slate-200">Batal</button>
                    <button id="btn-confirm-delete" class="px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition w-full shadow-lg shadow-red-500/30">Hapus</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, setDoc, getDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCKADYtUMevvw-iwQoM-69FhK7SQDYpttw",
            authDomain: "web-katalog.firebaseapp.com",
            projectId: "web-katalog",
            storageBucket: "web-katalog.firebasestorage.app",
            messagingSenderId: "258373982795",
            appId: "1:258373982795:web:53420acc4e57ece18f0bce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State Global
        let allThemes = [];
        let allLinks = [];
        let categoryOrder = [];
        let linkOrder = [];
        let uniqueCategories = new Set();
        let sortableInstance = null;
        let linkSortableInstance = null;
        let isSidebarOpen = true; // State Sidebar

        const settingsDocRef = doc(db, "settings", "category_order");
        const linkSettingsDocRef = doc(db, "settings", "link_order");
        const themesContent = document.getElementById('themes-content');
        const loadingState = document.getElementById('loading-state');
        const linksContent = document.getElementById('links-content');

        // ==== SIDEBAR TOGGLE ====
        window.toggleSidebar = () => {
            isSidebarOpen = !isSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const wrapper = document.getElementById('sidebar-wrapper');
            const toggleBtn = document.getElementById('sidebar-toggle-btn');
            
            if (isSidebarOpen) {
                sidebar.classList.remove('hidden');
                wrapper.classList.remove('lg:w-auto');
                wrapper.classList.add('lg:w-[420px]');
                toggleBtn.classList.remove('bg-blue-50', 'text-blue-600', 'border-blue-200');
                toggleBtn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
            } else {
                sidebar.classList.add('hidden');
                wrapper.classList.remove('lg:w-[420px]');
                wrapper.classList.add('lg:w-auto');
                toggleBtn.classList.add('bg-blue-50', 'text-blue-600', 'border-blue-200');
                toggleBtn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
            }
            
            updateGridColumns();
        };

        window.updateGridColumns = () => {
            const grids = document.querySelectorAll('.theme-grid');
            grids.forEach(grid => {
                if (isSidebarOpen) {
                    grid.className = 'theme-grid grid grid-cols-1 md:grid-cols-2 gap-5';
                } else {
                    grid.className = 'theme-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5';
                }
            });
        };

        // ==== INIT APP ====
        async function init() {
            await fetchLinks();
            await fetchData();
        }

        // ==== FETCH & RENDER LINKS PENTING ====
        async function fetchLinks() {
            try {
                // Fetch saved order first
                const linkSettingsSnap = await getDoc(linkSettingsDocRef);
                if (linkSettingsSnap.exists()) {
                    linkOrder = linkSettingsSnap.data().order || [];
                }

                const linksRef = collection(db, "important_links");
                const q = query(linksRef, orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                allLinks = [];
                querySnapshot.forEach((doc) => {
                    allLinks.push({ id: doc.id, ...doc.data() });
                });
                
                // Sort by linkOrder
                allLinks.sort((a, b) => {
                    const indexA = linkOrder.indexOf(a.id);
                    const indexB = linkOrder.indexOf(b.id);
                    if (indexA === -1 && indexB === -1) return 0;
                    if (indexA === -1) return 1; // Unordered items go to the end
                    if (indexB === -1) return -1;
                    return indexA - indexB;
                });

                renderLinks();
                
                if (allLinks.length > 0) {
                    initLinkSortable();
                }
            } catch (error) {
                console.error("Error fetching links:", error);
                linksContent.innerHTML = `<p class="text-sm text-red-500 text-center py-4">Gagal memuat link.</p>`;
            }
        }

        function renderLinks() {
            if (allLinks.length === 0) {
                linksContent.innerHTML = `
                    <div class="text-center py-6 px-4 bg-slate-50 border border-dashed border-slate-300 rounded-xl">
                        <p class="text-sm text-slate-500 font-medium">Belum ada link penting.</p>
                    </div>`;
                return;
            }

            linksContent.innerHTML = allLinks.map(link => `
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 relative group hover:border-blue-300 transition-colors link-item" data-id="${link.id}">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex gap-2 w-full pr-6">
                            <!-- Drag Handle -->
                            <div class="mt-0.5 cursor-grab link-drag-handle hover:text-blue-600 text-slate-400 transition" title="Geser untuk mengatur urutan">
                                <i class="ph ph-dots-six-vertical text-lg"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-slate-800 text-sm leading-tight">${link.title}</h4>
                                ${link.description ? `<p class="text-xs text-slate-500 mt-1 whitespace-pre-wrap">${link.description}</p>` : ''}
                            </div>
                        </div>
                        
                        <!-- 3 Dots Menu (Kebab) -->
                        <div class="absolute top-2.5 right-2">
                            <button onclick="toggleDropdown(event, 'dropdown-${link.id}')" class="p-1 text-slate-400 hover:text-blue-600 bg-white rounded-md shadow-sm border border-slate-100 transition">
                                <i class="ph ph-dots-three-vertical font-bold"></i>
                            </button>
                            
                            <!-- Dropdown Menu -->
                            <div id="dropdown-${link.id}" class="hidden absolute right-0 mt-1 w-28 bg-white border border-slate-200 rounded-lg shadow-xl z-[60] overflow-hidden">
                                <button onclick="editLink('${link.id}')" class="w-full text-left px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:text-blue-600 flex items-center gap-2 transition">
                                    <i class="ph ph-pencil-simple text-sm"></i> Edit
                                </button>
                                <div class="h-px bg-slate-100"></div>
                                <button onclick="confirmDelete('${link.id}', 'link')" class="w-full text-left px-3 py-2 text-xs font-semibold text-red-600 hover:bg-red-50 flex items-center gap-2 transition">
                                    <i class="ph ph-trash text-sm"></i> Hapus
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex gap-2 pl-6">
                        <a href="${link.url}" target="_blank" class="flex-1 bg-white hover:bg-blue-50 border border-slate-200 hover:border-blue-200 text-slate-700 hover:text-blue-700 text-center py-1.5 rounded-lg text-xs font-bold transition flex items-center justify-center gap-1.5 shadow-sm">
                            <i class="ph ph-arrow-square-out text-sm"></i> Buka
                        </a>
                        <button onclick="copyToClipboard('${link.url}')" class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-100 text-center py-1.5 rounded-lg text-xs font-bold transition flex items-center justify-center gap-1.5 shadow-sm">
                            <i class="ph ph-copy text-sm"></i> Copy
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Initialize SortableJS for Links
        function initLinkSortable() {
            const el = document.getElementById('links-content');
            if (linkSortableInstance) linkSortableInstance.destroy();
            
            linkSortableInstance = new Sortable(el, {
                animation: 150,
                handle: '.link-drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: async function () {
                    const items = el.querySelectorAll('.link-item');
                    const newOrder = Array.from(items).map(item => item.getAttribute('data-id'));
                    
                    try {
                        await setDoc(linkSettingsDocRef, { order: newOrder }, { merge: true });
                        linkOrder = newOrder;
                        showToast("Urutan link berhasil disimpan!", "success");
                    } catch (error) {
                        console.error("Error saving link order:", error);
                        showToast("Gagal menyimpan urutan link.", "error");
                    }
                }
            });
        }

        // ==== FETCH & RENDER THEMES ====
        async function fetchData() {
            loadingState.classList.remove('hidden');
            themesContent.classList.add('hidden');
            
            try {
                const settingsSnap = await getDoc(settingsDocRef);
                if (settingsSnap.exists()) {
                    categoryOrder = settingsSnap.data().order || [];
                }

                const themesRef = collection(db, "dashboard_generator");
                const q = query(themesRef, orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                allThemes = [];
                uniqueCategories.clear();

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    allThemes.push({ id: doc.id, ...data });
                    if (data.category) uniqueCategories.add(data.category);
                });

                updateCategoryDropdown();
                renderUI();

            } catch (error) {
                console.error("Error fetching data:", error);
                showToast("Gagal memuat data. Cek koneksi internet Anda.", "error");
            } finally {
                loadingState.classList.add('hidden');
                themesContent.classList.remove('hidden');
            }
        }

        function renderUI() {
            themesContent.innerHTML = '';

            let displayOrder = [...categoryOrder];
            uniqueCategories.forEach(cat => {
                if (!displayOrder.includes(cat)) {
                    displayOrder.push(cat);
                }
            });

            const groupedThemes = {};
            allThemes.forEach(theme => {
                const cat = theme.category || 'Tanpa Kategori';
                if (!groupedThemes[cat]) groupedThemes[cat] = [];
                groupedThemes[cat].push(theme);
            });

            if (allThemes.length === 0) {
                themesContent.innerHTML = `
                    <div class="text-center py-24 border-2 border-dashed border-slate-300 rounded-3xl bg-white">
                        <i class="ph ph-images text-6xl text-slate-300 mb-4 block"></i>
                        <h3 class="text-xl font-bold text-slate-800">Belum Ada Tema</h3>
                        <p class="text-slate-500 mt-2 mb-6">Mulai kelola katalog dengan menambahkan tema undangan pertama Anda.</p>
                        <button onclick="openThemeModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition shadow-lg shadow-blue-500/30 inline-flex items-center gap-2">
                            <i class="ph ph-plus-circle text-xl"></i> Tambah Tema Baru
                        </button>
                    </div>`;
                return;
            }

            displayOrder.forEach(category => {
                if (groupedThemes[category] && groupedThemes[category].length > 0) {
                    const section = document.createElement('div');
                    
                    // Header Kategori
                    const header = document.createElement('div');
                    header.className = 'flex items-center gap-4 mb-5';
                    header.innerHTML = `
                        <h2 class="text-lg font-bold text-slate-800 px-4 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm">
                            ${category}
                        </h2>
                        <div class="h-px bg-slate-200 flex-1"></div>
                    `;
                    section.appendChild(header);

                    const grid = document.createElement('div');
                    grid.className = isSidebarOpen ? 'theme-grid grid grid-cols-1 md:grid-cols-2 gap-5' : 'theme-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5';

                    groupedThemes[category].forEach(theme => {
                        const card = document.createElement('div');
                        card.className = 'group relative flex bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-300 transition-all duration-300';
                        
                        const imgUrl = theme.imageUrl || 'https://via.placeholder.com/400x400?text=No+Image';

                        // Pure Blue Theme Cards
                        card.innerHTML = `
                            <!-- Left: Image 1:1 Fixed Aspect Square -->
                            <div class="w-[110px] sm:w-[130px] shrink-0 border-r border-slate-100 relative aspect-square overflow-hidden bg-slate-100">
                                <img src="${imgUrl}" alt="${theme.title}" class="absolute inset-0 w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x400?text=Error'">
                            </div>
                            
                            <!-- Right: Content -->
                            <div class="p-3.5 flex-1 flex flex-col justify-between min-w-0">
                                <div>
                                    <h3 class="text-base font-bold text-slate-800 leading-tight line-clamp-2" title="${theme.title}">${theme.title}</h3>
                                    <span class="inline-block px-2 py-0.5 bg-blue-50 text-blue-600 text-[10px] font-bold rounded mt-1.5 uppercase tracking-wider truncate max-w-full">${theme.category}</span>
                                </div>
                                
                                <div class="flex gap-2 mt-3">
                                    <a href="${theme.linkGenerator}" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white border border-transparent text-center py-1.5 rounded-lg text-sm font-semibold transition duration-200 flex items-center justify-center gap-1 shadow-sm shadow-blue-500/20">
                                        <i class="ph ph-faders text-lg"></i> Gen
                                    </a>
                                    <a href="${theme.linkPreview}" target="_blank" class="flex-1 bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 text-center py-1.5 rounded-lg text-sm font-semibold transition duration-200 flex items-center justify-center gap-1 shadow-sm">
                                        <i class="ph ph-eye text-lg"></i> Prev
                                    </a>
                                </div>
                            </div>

                            <!-- Floating Action Buttons -->
                            <div class="absolute top-2 right-2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                                <button onclick="duplicateTheme('${theme.id}')" class="bg-white/90 hover:bg-blue-50 border border-slate-200 hover:border-blue-200 text-blue-600 p-1.5 rounded-lg shadow-sm backdrop-blur-md transition" title="Duplikat Tema">
                                    <i class="ph ph-copy text-sm font-bold"></i>
                                </button>
                                <button onclick="editTheme('${theme.id}')" class="bg-white/90 hover:bg-blue-50 border border-slate-200 hover:border-blue-200 text-slate-600 hover:text-blue-600 p-1.5 rounded-lg shadow-sm backdrop-blur-md transition" title="Edit Tema">
                                    <i class="ph ph-pencil-simple text-sm font-bold"></i>
                                </button>
                                <button onclick="confirmDelete('${theme.id}', 'theme')" class="bg-white/90 hover:bg-red-50 border border-slate-200 hover:border-red-200 text-red-600 p-1.5 rounded-lg shadow-sm backdrop-blur-md transition" title="Hapus Tema">
                                    <i class="ph ph-trash text-sm font-bold"></i>
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });

                    section.appendChild(grid);
                    themesContent.appendChild(section);
                }
            });
        }

        // ==== SELECT DROPDOWN LOGIC ====
        function updateCategoryDropdown() {
            const select = document.getElementById('theme-category-select');
            select.innerHTML = '<option value="" disabled selected>-- Pilih Kategori --</option>';
            
            const allCats = new Set([...uniqueCategories, ...categoryOrder]);
            
            allCats.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.innerText = cat;
                select.appendChild(option);
            });

            const newOption = document.createElement('option');
            newOption.value = "__NEW__";
            newOption.innerText = "+ Tambah Kategori Baru";
            newOption.className = "font-bold text-blue-600";
            select.appendChild(newOption);
        }

        window.toggleNewCategoryInput = () => {
            const select = document.getElementById('theme-category-select');
            const input = document.getElementById('theme-category-new');
            
            if (select.value === '__NEW__') {
                input.classList.remove('hidden');
                input.required = true;
                input.value = '';
                input.focus();
            } else {
                input.classList.add('hidden');
                input.required = false;
            }
        };

        // ==== FORM HANDLING FOR THEME ====
        window.openThemeModal = () => {
            document.getElementById('theme-form').reset();
            document.getElementById('theme-id').value = '';
            
            document.getElementById('theme-category-select').value = '';
            document.getElementById('theme-category-new').classList.add('hidden');
            document.getElementById('theme-category-new').required = false;

            document.getElementById('modal-title').innerText = 'Tambah Tema Baru';
            document.getElementById('btn-submit').innerHTML = '<i class="ph ph-floppy-disk text-lg"></i><span>Simpan Data</span>';
            
            const modal = document.getElementById('theme-modal');
            const panel = document.getElementById('theme-modal-panel');
            modal.classList.remove('hidden');
            
            panel.classList.remove('modal-exit', 'modal-exit-active');
            panel.classList.add('modal-enter');
            requestAnimationFrame(() => panel.classList.add('modal-enter-active'));
        };

        window.closeThemeModal = () => {
            const modal = document.getElementById('theme-modal');
            const panel = document.getElementById('theme-modal-panel');
            
            panel.classList.remove('modal-enter-active');
            panel.classList.add('modal-exit', 'modal-exit-active');
            
            setTimeout(() => modal.classList.add('hidden'), 200);
        };

        window.handleThemeSubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i><span>Menyimpan...</span>';
            btn.disabled = true;

            const id = document.getElementById('theme-id').value;
            let categoryInput = document.getElementById('theme-category-select').value;
            if (categoryInput === '__NEW__') {
                categoryInput = document.getElementById('theme-category-new').value.trim();
            }
            
            const themeData = {
                title: document.getElementById('theme-title').value,
                category: categoryInput,
                imageUrl: document.getElementById('theme-image').value,
                linkGenerator: document.getElementById('theme-generator').value,
                linkPreview: document.getElementById('theme-preview').value,
            };

            try {
                if (id) {
                    const docRef = doc(db, "dashboard_generator", id);
                    await updateDoc(docRef, themeData);
                    showToast("Tema berhasil diperbarui!", "success");
                } else {
                    themeData.createdAt = serverTimestamp();
                    await addDoc(collection(db, "dashboard_generator"), themeData);
                    showToast("Tema berhasil ditambahkan!", "success");
                }

                if (!categoryOrder.includes(categoryInput)) {
                    categoryOrder.push(categoryInput);
                    await setDoc(settingsDocRef, { order: categoryOrder }, { merge: true });
                }

                closeThemeModal();
                fetchData();

            } catch (error) {
                console.error("Error saving doc:", error);
                showToast("Gagal menyimpan data.", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        window.editTheme = (id) => {
            const theme = allThemes.find(t => t.id === id);
            if (!theme) return;

            document.getElementById('theme-id').value = theme.id;
            document.getElementById('theme-title').value = theme.title;
            
            const select = document.getElementById('theme-category-select');
            const newCatInput = document.getElementById('theme-category-new');
            const existsInOptions = Array.from(select.options).some(opt => opt.value === theme.category);
            
            if (existsInOptions) {
                select.value = theme.category;
                newCatInput.classList.add('hidden');
                newCatInput.required = false;
            } else {
                select.value = '__NEW__';
                newCatInput.value = theme.category;
                newCatInput.classList.remove('hidden');
                newCatInput.required = true;
            }

            document.getElementById('theme-image').value = theme.imageUrl;
            document.getElementById('theme-generator').value = theme.linkGenerator;
            document.getElementById('theme-preview').value = theme.linkPreview;

            document.getElementById('modal-title').innerText = 'Edit Tema';
            document.getElementById('btn-submit').innerHTML = '<i class="ph ph-check-circle text-lg"></i><span>Update Data</span>';
            
            const modal = document.getElementById('theme-modal');
            const panel = document.getElementById('theme-modal-panel');
            modal.classList.remove('hidden');
            panel.classList.remove('modal-exit', 'modal-exit-active');
            panel.classList.add('modal-enter');
            requestAnimationFrame(() => panel.classList.add('modal-enter-active'));
        };

        window.duplicateTheme = (id) => {
            const theme = allThemes.find(t => t.id === id);
            if (!theme) return;

            document.getElementById('theme-id').value = ''; 
            document.getElementById('theme-title').value = theme.title + ' (Copy)'; 
            
            const select = document.getElementById('theme-category-select');
            const newCatInput = document.getElementById('theme-category-new');
            const existsInOptions = Array.from(select.options).some(opt => opt.value === theme.category);
            
            if (existsInOptions) {
                select.value = theme.category;
                newCatInput.classList.add('hidden');
                newCatInput.required = false;
            } else {
                select.value = '__NEW__';
                newCatInput.value = theme.category;
                newCatInput.classList.remove('hidden');
                newCatInput.required = true;
            }

            document.getElementById('theme-image').value = theme.imageUrl;
            document.getElementById('theme-generator').value = theme.linkGenerator;
            document.getElementById('theme-preview').value = theme.linkPreview;

            document.getElementById('modal-title').innerText = 'Duplikat Tema';
            document.getElementById('btn-submit').innerHTML = '<i class="ph ph-files text-lg"></i><span>Simpan Sebagai Baru</span>';
            
            const modal = document.getElementById('theme-modal');
            const panel = document.getElementById('theme-modal-panel');
            modal.classList.remove('hidden');
            panel.classList.remove('modal-exit', 'modal-exit-active');
            panel.classList.add('modal-enter');
            requestAnimationFrame(() => panel.classList.add('modal-enter-active'));
        };

        // ==== FORM HANDLING FOR LINKS PENTING ====
        window.openLinkModal = () => {
            document.getElementById('link-form').reset();
            document.getElementById('link-id').value = '';
            document.getElementById('link-modal-title').innerText = 'Tambah Link Penting';
            document.getElementById('btn-submit-link').innerHTML = '<i class="ph ph-floppy-disk text-lg"></i><span>Simpan Link</span>';
            
            const modal = document.getElementById('link-modal');
            const panel = document.getElementById('link-modal-panel');
            modal.classList.remove('hidden');
            
            panel.classList.remove('modal-exit', 'modal-exit-active');
            panel.classList.add('modal-enter');
            requestAnimationFrame(() => panel.classList.add('modal-enter-active'));
        };

        window.closeLinkModal = () => {
            const modal = document.getElementById('link-modal');
            const panel = document.getElementById('link-modal-panel');
            
            panel.classList.remove('modal-enter-active');
            panel.classList.add('modal-exit', 'modal-exit-active');
            
            setTimeout(() => modal.classList.add('hidden'), 200);
        };

        window.handleLinkSubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-link');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i><span>Menyimpan...</span>';
            btn.disabled = true;

            const id = document.getElementById('link-id').value;
            const linkData = {
                title: document.getElementById('link-title').value,
                description: document.getElementById('link-desc').value,
                url: document.getElementById('link-url').value,
            };

            try {
                if (id) {
                    const docRef = doc(db, "important_links", id);
                    await updateDoc(docRef, linkData);
                    showToast("Link berhasil diperbarui!", "success");
                } else {
                    linkData.createdAt = serverTimestamp();
                    const newDocRef = await addDoc(collection(db, "important_links"), linkData);
                    
                    // Tambahkan ke urutan link baru di paling akhir
                    linkOrder.push(newDocRef.id);
                    await setDoc(linkSettingsDocRef, { order: linkOrder }, { merge: true });
                    
                    showToast("Link berhasil ditambahkan!", "success");
                }
                closeLinkModal();
                fetchLinks();

            } catch (error) {
                console.error("Error saving link:", error);
                showToast("Gagal menyimpan link.", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        window.editLink = (id) => {
            const link = allLinks.find(l => l.id === id);
            if (!link) return;

            document.getElementById('link-id').value = link.id;
            document.getElementById('link-title').value = link.title;
            document.getElementById('link-desc').value = link.description || '';
            document.getElementById('link-url').value = link.url;

            document.getElementById('link-modal-title').innerText = 'Edit Link Penting';
            document.getElementById('btn-submit-link').innerHTML = '<i class="ph ph-check-circle text-lg"></i><span>Update Link</span>';
            
            document.getElementById(`dropdown-${id}`).classList.add('hidden');

            const modal = document.getElementById('link-modal');
            const panel = document.getElementById('link-modal-panel');
            modal.classList.remove('hidden');
            panel.classList.remove('modal-exit', 'modal-exit-active');
            panel.classList.add('modal-enter');
            requestAnimationFrame(() => panel.classList.add('modal-enter-active'));
        };

        // ==== UNIVERSAL DELETE HANDLING ====
        let deleteTargetId = null;
        let deleteTargetType = 'theme';

        window.confirmDelete = (id, type) => {
            deleteTargetId = id;
            deleteTargetType = type;
            
            const titleEl = document.getElementById('confirm-title');
            const descEl = document.getElementById('confirm-desc');
            
            if (type === 'theme') {
                titleEl.innerText = 'Hapus Tema?';
                descEl.innerText = 'Data tema ini akan dihapus secara permanen.';
            } else {
                titleEl.innerText = 'Hapus Link?';
                descEl.innerText = 'Link penting ini akan dihapus secara permanen.';
                document.getElementById(`dropdown-${id}`).classList.add('hidden');
            }

            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeConfirmModal = () => {
            deleteTargetId = null;
            document.getElementById('confirm-modal').classList.add('hidden');
        };

        document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
            if (!deleteTargetId) return;
            
            const btn = document.getElementById('btn-confirm-delete');
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i>';
            btn.disabled = true;

            try {
                const collectionName = deleteTargetType === 'theme' ? "dashboard_generator" : "important_links";
                await deleteDoc(doc(db, collectionName, deleteTargetId));
                
                showToast(`${deleteTargetType === 'theme' ? 'Tema' : 'Link'} berhasil dihapus.`, "success");
                closeConfirmModal();
                
                if (deleteTargetType === 'theme') fetchData();
                else fetchLinks();

            } catch (error) {
                console.error("Error deleting doc:", error);
                showToast("Gagal menghapus data.", "error");
            } finally {
                btn.innerHTML = 'Hapus';
                btn.disabled = false;
            }
        });

        // ==== UTILITIES ====
        window.copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Link disalin ke clipboard!", "success");
            } catch (err) {
                showToast("Gagal menyalin link.", "error");
            }
            document.body.removeChild(textArea);
        };

        window.toggleDropdown = (event, id) => {
            event.stopPropagation(); 
            document.querySelectorAll('[id^="dropdown-"]').forEach(el => {
                if(el.id !== id) el.classList.add('hidden');
            });
            document.getElementById(id).classList.toggle('hidden');
        };

        document.addEventListener('click', () => {
            document.querySelectorAll('[id^="dropdown-"]').forEach(el => {
                el.classList.add('hidden');
            });
        });

        // ==== CATEGORY DRAG & DROP ====
        window.openCategoryModal = () => {
            const ul = document.getElementById('sortable-categories');
            ul.innerHTML = '';
            
            let displayOrder = [...categoryOrder];
            uniqueCategories.forEach(cat => {
                if (!displayOrder.includes(cat)) {
                    displayOrder.push(cat);
                }
            });

            if (displayOrder.length === 0) {
                ul.innerHTML = '<li class="text-slate-500 text-center py-4 text-sm bg-slate-50 rounded-lg border border-slate-200">Belum ada kategori yang terdaftar.</li>';
            } else {
                displayOrder.forEach(cat => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center gap-3 bg-white border border-slate-200 shadow-sm p-3 rounded-lg text-slate-800';
                    li.innerHTML = `
                        <i class="ph ph-dots-six-vertical text-slate-400 text-xl cursor-grab hover:text-blue-500 transition"></i>
                        <span class="flex-1 font-semibold" data-id="${cat}">${cat}</span>
                    `;
                    ul.appendChild(li);
                });

                if (sortableInstance) sortableInstance.destroy();
                sortableInstance = new Sortable(ul, {
                    animation: 150,
                    handle: '.ph-dots-six-vertical',
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag'
                });
            }

            const modal = document.getElementById('category-modal');
            const panel = document.getElementById('category-modal-panel');
            modal.classList.remove('hidden');
            panel.classList.remove('modal-exit', 'modal-exit-active');
            panel.classList.add('modal-enter');
            requestAnimationFrame(() => panel.classList.add('modal-enter-active'));
        };

        window.closeCategoryModal = () => {
            const modal = document.getElementById('category-modal');
            const panel = document.getElementById('category-modal-panel');
            
            panel.classList.remove('modal-enter-active');
            panel.classList.add('modal-exit', 'modal-exit-active');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        };

        window.saveCategoryOrder = async () => {
            const btn = document.getElementById('btn-save-category');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-lg"></i><span>Menyimpan...</span>';
            btn.disabled = true;

            const spans = document.querySelectorAll('#sortable-categories span[data-id]');
            const newOrder = Array.from(spans).map(span => span.getAttribute('data-id'));

            try {
                await setDoc(settingsDocRef, { order: newOrder }, { merge: true });
                categoryOrder = newOrder;
                showToast("Urutan kategori berhasil disimpan!", "success");
                closeCategoryModal();
                updateCategoryDropdown();
                renderUI(); 
            } catch (error) {
                console.error("Error saving category order:", error);
                showToast("Gagal menyimpan urutan.", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // ==== TOAST NOTIFICATION ====
        let toastTimeout;
        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            const iconEl = document.getElementById('toast-icon');

            msgEl.innerText = message;
            
            toast.className = 'fixed bottom-5 right-5 transform transition-all duration-300 z-[100] flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl border bg-white';

            if (type === "success") {
                toast.classList.add('border-green-200');
                iconEl.className = 'ph ph-check-circle text-2xl text-green-500';
            } else {
                toast.classList.add('border-red-200');
                iconEl.className = 'ph ph-warning-circle text-2xl text-red-500';
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Start initialization
        init();
    </script>
</body>
</html>
